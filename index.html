<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Vecta - Application de dessin vectoriel">
  <title>Vecta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app-ground {
      width: 100%;
      height: 100%;
      display: flex;
    }
    #app-ground.landscape {
      flex-direction: row;
    }
    #app-ground.portrait {
      flex-direction: column;
    }
    #corePanel {
      background: rgba(30, 30, 50, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px;
      gap: 12px;
      z-index: 100;
      transition: all 0.3s ease;
    }
    #corePanel.hidden {
      display: none;
    }
    .landscape #corePanel {
      width: 240px;
      height: 100%;
    }
    .portrait #corePanel {
      width: 100%;
      height: 240px;
      flex-direction: row;
      padding: 8px 12px;
      gap: 8px;
    }
    .portrait #corePanel .panel-header {
      flex-direction: column;
      gap: 4px;
    }
    .portrait #corePanel #panelTools,
    .portrait #corePanel #panelColors,
    .portrait #corePanel #panelSizes {
      flex-direction: row;
    }
    .portrait #corePanel .panel-sep {
      width: 1px;
      height: 32px;
    }
    .portrait #corePanel .panel-app-info {
      font-size: 10px;
    }
    
    /* Panel Sections */
    .panel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-shrink: 0;
    }
    
    .panel-section-header {
      height: 44px;
      flex: 0 0 44px;
    }
    
    .panel-section-tool {
      height: 240px;
      flex: 0 0 240px;
    }
    
    #panelTools {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: flex-start;
      gap: 8px;
    }
    
    .panel-section-colors {
      max-height: 80px;
      flex: 0 0 80px;
      overflow-y: auto;
    }
    
    #panelColors {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
    }
    
    .panel-section-sizes {
      max-height: 60px;
      flex: 0 0 60px;
      overflow-y: auto;
    }
    
    #panelSizes {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 4px;
    }
    
    /* Portrait sections */
    .portrait .panel-section {
      height: 100%;
      flex-direction: row;
      flex-wrap: wrap;
    }
    .portrait .panel-section-header {
      width: auto;
      height: auto;
      flex: 1;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
    }
    .portrait .panel-section-tool {
      width: 100%;
      height: auto;
      flex: 1;
    }
    .portrait .panel-section-colors {
      width: 100%;
      max-width: none;
      height: auto;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }
    
    .portrait #panelColors {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .portrait .panel-section-sizes {
      width: 100%;
      max-width: none;
      height: auto;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
    }

    .portrait #panelSizes {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
    }

    .portrait #panelTools {
      flex-wrap: wrap;
      justify-content: center;
    }

    .portrait .panel-header {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      width: 100%;
    }
    
    .portrait .panel-app-info {
      flex-direction: row;
      gap: 8px;
    }
    
    .panel-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .panel-app-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
    }
    .app-name {
      font-weight: bold;
      color: #fff;
    }
    .app-version {
      font-size: 9px;
    }
    .panel-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .panel-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
    }
    #corePanelContainer {
      flex-shrink: 0;
    }
    #drawAreaContainer {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
    }
    #drawArea {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #drawArea canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #panelTools {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .panel-tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .panel-tool-btn.active {
      border-color: #4fc3f7;
      background: rgba(79, 195, 247, 0.2);
    }
    .panel-tool-btn svg {
      width: 20px;
      height: 20px;
      stroke: #fff;
      fill: none;
      stroke-width: 2;
    }
    #panelColors {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
    }
    .panel-sep {
      width: 32px;
      height: 1px;
      background: rgba(255, 255, 255, 0.2);
    }
    .panel-color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }
    .panel-color-btn.active {
      border-color: #fff;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }
    #panelSizes {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
    }
    .panel-size-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
    }
    .panel-size-btn.active {
      background: rgba(79, 195, 247, 0.4);
      border-color: #4fc3f7;
    }
  </style>
</head>
<body>
  <script src="tnt.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
