<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Vecta - Application de dessin vectoriel">
  <title>Vecta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="panel.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app-ground {
      width: 100%;
      height: calc(100% - 2em - 1.6em);
      display: flex;
    }
    #statusBar {
      width: 100%;
      height: 2em;
      background: rgba(30, 30, 50, 0.95);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.75em;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    #statusBar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #statusBar .label {
      color: rgba(255, 255, 255, 0.4);
    }
    #statusBar .value {
      color: #4fc3f7;
    }

    /* Raw states bar — debug overlay above statusBar */
    #rawStatesBar {
      width: 100%;
      min-height: 1.6em;
      background: rgba(20, 20, 35, 0.97);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      padding: 3px 8px;
      gap: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.65em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .raw-state-group {
      display: flex;
      align-items: center;
      gap: 3px;
      padding-right: 8px;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }
    .raw-state-group:last-child {
      border-right: none;
    }
    .raw-label {
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-size: 0.85em;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    .raw-chip {
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      white-space: nowrap;
    }
    .raw-chip.active {
      background: rgba(105, 240, 174, 0.18);
      color: #69f0ae;
      border-color: #69f0ae;
      box-shadow: 0 0 6px rgba(105, 240, 174, 0.25);
    }
    .raw-chip.raw-toggle.active {
      background: rgba(255, 183, 77, 0.18);
      color: #ffb74d;
      border-color: #ffb74d;
      box-shadow: 0 0 6px rgba(255, 183, 77, 0.25);
    }
    #app-ground.landscape {
      flex-direction: row;
    }
    #app-ground.portrait {
      flex-direction: column;
    }
    #corePanelContainer {
      flex-shrink: 0;
    }
    #drawAreaContainer {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
    }
    #drawArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    #drawAreaSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #drawAreaSvg path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #svgPaths path {
      pointer-events: stroke;
    }
    #currentPath {
      pointer-events: none;
    }
    #touchOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/svg-path-commander/dist/index.min.js"></script>
  <script src="tnt.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
