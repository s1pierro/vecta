<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Vecta - Application de dessin vectoriel">
  <title>Vecta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="panel.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app-ground {
      width: 100%;
      height: calc(100% - 2em);
      display: flex;
    }
    #statusBar {
      width: 100%;
      height: 2em;
      background: rgba(30, 30, 50, 0.95);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.75em;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    #statusBar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #statusBar .label {
      color: rgba(255, 255, 255, 0.4);
    }
    #statusBar .value {
      color: #4fc3f7;
    }

    /* Raw states modal — draggable, resizable debug panel */
    #rawStatesModal {
      position: fixed;
      top: 10vh;
      left: 10vw;
      width: 33vw;
      height: 50vh;
      min-width: 200px;
      min-height: 150px;
      z-index: 9999;
      background: rgba(15, 15, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }
    #rawStatesModal .raw-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }
    #rawStatesModal .raw-modal-header:active {
      cursor: grabbing;
    }
    #rawStatesModal .raw-modal-title {
      font-size: 0.7em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #rawStatesModal .raw-modal-close {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #rawStatesModal .raw-modal-close:hover {
      background: rgba(255, 80, 80, 0.3);
      color: #fff;
    }
    #rawStatesModal .raw-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
    }

    /* Raw state chips — generic styles (work in #rawStatesModal AND .sub-window) */
    .raw-state-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 4px;
    }
    .raw-label {
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-size: 0.75em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    .raw-chip {
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      white-space: nowrap;
      font-size: 0.65em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .raw-chip.active {
      background: rgba(105, 240, 174, 0.18);
      color: #69f0ae;
      border-color: #69f0ae;
      box-shadow: 0 0 6px rgba(105, 240, 174, 0.25);
    }
    .raw-chip.raw-toggle.active {
      background: rgba(255, 183, 77, 0.18);
      color: #ffb74d;
      border-color: #ffb74d;
      box-shadow: 0 0 6px rgba(255, 183, 77, 0.25);
    }

    /* Legacy scoped selectors for backward compat */
    #rawStatesModal .raw-state-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 4px;
    }
    #rawStatesModal .raw-label {
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-size: 0.75em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    #rawStatesModal .raw-chip {
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      white-space: nowrap;
      font-size: 0.65em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    #rawStatesModal .raw-chip.active {
      background: rgba(105, 240, 174, 0.18);
      color: #69f0ae;
      border-color: #69f0ae;
      box-shadow: 0 0 6px rgba(105, 240, 174, 0.25);
    }
    #rawStatesModal .raw-chip.raw-toggle.active {
      background: rgba(255, 183, 77, 0.18);
      color: #ffb74d;
      border-color: #ffb74d;
      box-shadow: 0 0 6px rgba(255, 183, 77, 0.25);
    }
    /* Resize handle */
    #rawStatesModal::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
      border-bottom-right-radius: 8px;
    }

    /* Sub-window resize handle */
    .sub-window::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
      border-bottom-right-radius: 8px;
    }
    .sub-window-header:active { cursor: grabbing; }
    .sub-window-close:hover { background: rgba(255,80,80,0.3); color: #fff; }

    /* Tool buttons active state */
    .panel-tool-btn.active {
      background: rgba(79,195,247,0.15) !important;
      color: #4fc3f7 !important;
      border-color: #4fc3f7 !important;
    }

    /* Node type buttons active state */
    .node-type-btn.active {
      background: rgba(105,240,174,0.15) !important;
      color: #69f0ae !important;
      border-color: #69f0ae !important;
    }

    /* Sub-windows list in panel */
    .subwindows-header {
      padding: 4px 0;
      margin-bottom: 4px;
    }
    .subwindows-title {
      color: rgba(255,255,255,0.4);
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .subwindows-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .subwindow-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 6px;
      border: none;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 0.7em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      transition: background 0.1s;
    }
    .subwindow-item:hover {
      background: rgba(255,255,255,0.1);
    }
    .subwindow-item.visible {
      background: rgba(105,240,174,0.1);
      color: #69f0ae;
    }
    .subwindow-item-title {
      flex: 1;
      text-align: left;
    }
    .subwindow-item-status {
      font-size: 0.9em;
      margin-left: 6px;
    }
    #app-ground.landscape {
      flex-direction: column;
    }
    #app-ground.portrait {
      flex-direction: column;
    }
    #corePanelContainer {
      flex-shrink: 0;
    }
    #drawAreaContainer {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      margin-top: 40px; /* space for topbar */
    }

    /* Top bar override */
    #corePanel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: rgba(30, 30, 50, 0.95);
      backdrop-filter: blur(8px);
      display: flex !important;
      align-items: center;
      z-index: 9999;
      padding: 0 8px;
      gap: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    #corePanel * {
      box-sizing: border-box;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }
    .topbar-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.7);
      flex-shrink: 0;
    }
    .topbar-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .topbar-sep {
      width: 1px;
      height: 24px;
      background: rgba(255, 255, 255, 0.15);
      margin: 0 4px;
      flex-shrink: 0;
    }
    .topbar-app-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      font-size: 0.75em;
      color: rgba(255, 255, 255, 0.4);
      flex-shrink: 0;
    }
    .topbar-app-info .app-name {
      font-weight: bold;
      color: rgba(255, 255, 255, 0.6);
    }
    /* JsonEditCard */
    .json-edit-card {
      background: transparent;
      border: none;
      border-radius: 4px;
      padding: 4px;
      margin: 2px 0;
    }
    /* Global: key names and indices base styles */
    .jec-key-name {
      font-size: 0.75em;
      font-family: 'SF Mono', monospace;
      min-width: 100px;
      padding-top: 2px;
    }
    .jec-idx {
      font-size: 0.7em;
      font-family: 'SF Mono', monospace;
      min-width: 20px;
      padding-top: 2px;
    }
    /* Direct children (depth 0): orange bg + all black text */
    .jec-root-level {
      background: #ff9800;
      color: #000000;
      border-radius: 6px;
      padding: 8px;
      position: relative;
    }
    /* Force ALL descendants of root-level to #000 */
    .jec-root-level .jec-key-name,
    .jec-root-level .jec-idx,
    .jec-root-level .jec-label,
    .jec-root-level .jec-type-tag,
    .jec-root-level .jec-type-inner,
    .jec-root-level .jec-null,
    .jec-root-level .jec-null-label,
    .jec-root-level .jec-add-btn,
    .jec-root-level .jec-del-btn,
    .jec-root-level input,
    .jec-root-level .jec-type-select {
      color: #000;
    }
    .jec-root-level input::placeholder {
      color: #000;
    }
    .jec-root-level .jec-add-btn {
      border-color: rgba(0,0,0,0.3);
      background: rgba(0,0,0,0.06);
    }
    .jec-root-level .jec-del-btn {
      background: rgba(0,0,0,0.1);
    }
    .jec-root-level .jec-type-select {
      border-color: rgba(0,0,0,0.3);
    }
    .jec-root-level .jec-type-select option {
      color: #000;
      background: #fff;
    }
    /* Sticky names for root-level children */
    .jec-root-level > .jec-items .jec-idx,
    .jec-root-level > .jec-keys .jec-key-name {
      position: sticky;
      top: 0;
      z-index: 1;
      background: rgba(255,152,0,0.85);
      backdrop-filter: blur(4px);
      padding: 2px 4px;
      border-radius: 3px;
    }
    /* Nested levels: black borders, #555 labels/placeholders */
    .jec-nested-level {
      background: transparent;
      border: 1px solid #000;
    }
    .jec-nested-level .jec-type-tag {
      color: #000;
      background: rgba(0,0,0,0.05);
      border: 1px solid #000;
    }
    .jec-nested-level .jec-label {
      color: #555;
    }
    .jec-nested-level .jec-null,
    .jec-nested-level .jec-null-label {
      color: #555;
    }
    .jec-nested-level input,
    .jec-nested-level .jec-string input,
    .jec-nested-level .jec-number input {
      color: #000;
      border-bottom-color: rgba(0,0,0,0.3);
    }
    .jec-nested-level input::placeholder {
      color: #555;
    }
    .jec-nested-level .jec-add-btn {
      color: #555;
      border-color: rgba(0,0,0,0.2);
      background: rgba(0,0,0,0.03);
    }
    .jec-nested-level .jec-del-btn {
      background: rgba(0,0,0,0.06);
      color: #555;
    }
    .jec-nested-level .jec-child .json-edit-card {
      border-color: #000;
    }
    .jec-nested-level .jec-type-select {
      color: #555;
      border-color: rgba(0,0,0,0.2);
    }
    .jec-nested-level .jec-type-select option {
      color: #555;
      background: #fff;
    }
    .jec-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }
    .jec-label {
      color: rgba(255,255,255,0.5);
      font-size: 0.75em;
      font-family: 'SF Mono', monospace;
    }
    .jec-del-btn {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: rgba(255,80,80,0.15);
      color: #ff5252;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .jec-del-btn:hover { background: rgba(255,80,80,0.3); }
    .jec-header {
      display: flex;
      align-items: center;
      margin-bottom: 4px;
    }
    .jec-type-tag {
      font-size: 0.65em;
      color: rgba(255,255,255,0.3);
      font-family: 'SF Mono', monospace;
      padding: 1px 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 3px;
    }
    .jec-type-inner {
      color: rgba(79,195,247,0.5);
      background: rgba(79,195,247,0.06);
      margin-left: 2px;
    }
    .jec-null-editor {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .jec-null-label {
      color: rgba(255,255,255,0.2);
      font-size: 0.75em;
      font-style: italic;
    }
    .jec-type-select {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      color: rgba(255,255,255,0.6);
      font-size: 0.7em;
      padding: 1px 4px;
      cursor: pointer;
    }
    .jec-type-select option {
      background: #1a1a2e;
      color: rgba(255,255,255,0.7);
    }
    .jec-items, .jec-keys {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .jec-row {
      display: flex;
      align-items: flex-start;
      gap: 4px;
    }
    .jec-idx {
      color: rgba(255,255,255,0.3);
      font-size: 0.7em;
      font-family: 'SF Mono', monospace;
      min-width: 20px;
      padding-top: 2px;
    }
    .jec-key-name {
      color: rgba(79,195,247,0.7);
      font-size: 0.75em;
      font-family: 'SF Mono', monospace;
      min-width: 100px;
      padding-top: 2px;
    }
    .jec-child { flex: 1; }
    .jec-add-btn {
      margin-top: 4px;
      padding: 2px 8px;
      background: rgba(105,240,174,0.1);
      border: 1px dashed rgba(105,240,174,0.3);
      border-radius: 3px;
      color: #69f0ae;
      cursor: pointer;
      font-size: 0.65em;
    }
    .jec-add-btn:hover { background: rgba(105,240,174,0.2); }
    .jec-null {
      color: rgba(255,255,255,0.2);
      font-size: 0.75em;
      font-style: italic;
    }
    .jec-bool {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.8em;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
    }
    .jec-bool input {
      accent-color: #4fc3f7;
    }
    /* Size selector button grid */
    .size-btn {
      padding: 0 !important;
    }
    .size-btn.active {
      background: rgba(79,195,247,0.1) !important;
      border-color: #4fc3f7 !important;
      box-shadow: 0 0 8px rgba(79,195,247,0.3);
    }
    .size-btn.active div {
      background: #4fc3f7 !important;
    }
    .topbar-win-list-gnome2 {
      display: flex;
      align-items: center;
      gap: 3px;
      flex: 1;
      overflow-x: auto;
      min-width: 0;
    }
    .topbar-win-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 0.7em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.15s;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .topbar-win-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.8);
    }
    .topbar-win-btn.active {
      background: rgba(79, 195, 247, 0.12);
      border-color: rgba(79, 195, 247, 0.4);
      color: #4fc3f7;
      box-shadow: inset 0 -1px 0 rgba(79, 195, 247, 0.3);
    }
    .topbar-win-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
    }
    .topbar-win-label {
      max-width: 80px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #drawArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    #drawAreaSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #drawAreaSvg path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #svgPaths path {
      pointer-events: stroke;
    }
    #currentPath {
      pointer-events: none;
    }
    #touchOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/svg-path-commander/dist/index.min.js"></script>
  <script src="tnt.js"></script>
  <script src="json-edit-card.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
