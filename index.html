<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Vecta - Application de dessin vectoriel">
  <title>Vecta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="panel.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app-ground {
      width: 100%;
      height: calc(100% - 2em);
      display: flex;
    }
    #statusBar {
      width: 100%;
      height: 2em;
      background: rgba(30, 30, 50, 0.95);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.75em;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    #statusBar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #statusBar .label {
      color: rgba(255, 255, 255, 0.4);
    }
    #statusBar .value {
      color: #4fc3f7;
    }
    #app-ground.landscape {
      flex-direction: row;
    }
    #app-ground.portrait {
      flex-direction: column;
    }
    #corePanelContainer {
      flex-shrink: 0;
    }
    #drawAreaContainer {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
    }
    #drawArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    #drawAreaSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 2970px;
      height: 2100px;
    }
    #drawAreaSvg path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #svgPaths path {
      pointer-events: stroke;
    }
    #currentPath {
      pointer-events: none;
    }
    #touchOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/svg-path-commander/dist/index.min.js"></script>
  <script src="tnt.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
