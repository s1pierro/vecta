<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
  <script>eruda.init();</script>
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Vecta - Application de dessin vectoriel">
  <title>Vecta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="stylesheet" href="panel.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: system-ui, sans-serif;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    #app-ground {
      width: 100%;
      height: calc(100% - 2em);
      display: flex;
    }
    #statusBar {
      width: 100%;
      height: 2em;
      background: rgba(30, 30, 50, 0.95);
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.75em;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    #statusBar span {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #statusBar .label {
      color: rgba(255, 255, 255, 0.4);
    }
    #statusBar .value {
      color: #4fc3f7;
    }

    /* Raw states modal — draggable, resizable debug panel */
    #rawStatesModal {
      position: fixed;
      top: 10vh;
      left: 10vw;
      width: 33vw;
      height: 50vh;
      min-width: 200px;
      min-height: 150px;
      z-index: 9999;
      background: rgba(15, 15, 30, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
    }
    #rawStatesModal .raw-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
    }
    #rawStatesModal .raw-modal-header:active {
      cursor: grabbing;
    }
    #rawStatesModal .raw-modal-title {
      font-size: 0.7em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #rawStatesModal .raw-modal-close {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #rawStatesModal .raw-modal-close:hover {
      background: rgba(255, 80, 80, 0.3);
      color: #fff;
    }
    #rawStatesModal .raw-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
    }

    /* Raw state chips — generic styles (work in #rawStatesModal AND .sub-window) */
    .raw-state-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 4px;
    }
    .raw-label {
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-size: 0.75em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    .raw-chip {
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      white-space: nowrap;
      font-size: 0.65em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .raw-chip.active {
      background: rgba(105, 240, 174, 0.18);
      color: #69f0ae;
      border-color: #69f0ae;
      box-shadow: 0 0 6px rgba(105, 240, 174, 0.25);
    }
    .raw-chip.raw-toggle.active {
      background: rgba(255, 183, 77, 0.18);
      color: #ffb74d;
      border-color: #ffb74d;
      box-shadow: 0 0 6px rgba(255, 183, 77, 0.25);
    }

    /* Legacy scoped selectors for backward compat */
    #rawStatesModal .raw-state-group {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 3px;
      padding: 4px 6px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 4px;
    }
    #rawStatesModal .raw-label {
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-size: 0.75em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: 0.5px;
      margin-right: 2px;
    }
    #rawStatesModal .raw-chip {
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.1s ease;
      white-space: nowrap;
      font-size: 0.65em;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    #rawStatesModal .raw-chip.active {
      background: rgba(105, 240, 174, 0.18);
      color: #69f0ae;
      border-color: #69f0ae;
      box-shadow: 0 0 6px rgba(105, 240, 174, 0.25);
    }
    #rawStatesModal .raw-chip.raw-toggle.active {
      background: rgba(255, 183, 77, 0.18);
      color: #ffb74d;
      border-color: #ffb74d;
      box-shadow: 0 0 6px rgba(255, 183, 77, 0.25);
    }
    /* Resize handle */
    #rawStatesModal::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
      border-bottom-right-radius: 8px;
    }

    /* Sub-window resize handle */
    .sub-window::after {
      content: '';
      position: absolute;
      bottom: 0;
      right: 0;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      background: linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.2) 50%);
      border-bottom-right-radius: 8px;
    }
    .sub-window-header:active { cursor: grabbing; }
    .sub-window-close:hover { background: rgba(255,80,80,0.3); color: #fff; }

    /* Sub-windows list in panel */
    .subwindows-header {
      padding: 4px 0;
      margin-bottom: 4px;
    }
    .subwindows-title {
      color: rgba(255,255,255,0.4);
      font-size: 0.7em;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .subwindows-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .subwindow-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 3px 6px;
      border: none;
      border-radius: 3px;
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      font-size: 0.7em;
      font-family: 'SF Mono', 'Fira Code', monospace;
      transition: background 0.1s;
    }
    .subwindow-item:hover {
      background: rgba(255,255,255,0.1);
    }
    .subwindow-item.visible {
      background: rgba(105,240,174,0.1);
      color: #69f0ae;
    }
    .subwindow-item-title {
      flex: 1;
      text-align: left;
    }
    .subwindow-item-status {
      font-size: 0.9em;
      margin-left: 6px;
    }
    #app-ground.landscape {
      flex-direction: row;
    }
    #app-ground.portrait {
      flex-direction: column;
    }
    #corePanelContainer {
      flex-shrink: 0;
    }
    #drawAreaContainer {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
    }
    #drawArea {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    #drawAreaSvg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #drawAreaSvg path {
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #svgPaths path {
      pointer-events: stroke;
    }
    #currentPath {
      pointer-events: none;
    }
    #touchOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }
  </style>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/svg-path-commander/dist/index.min.js"></script>
  <script src="tnt.js"></script>
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
